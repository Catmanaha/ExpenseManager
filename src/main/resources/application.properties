spring.application.name=ExpenseTracker

spring.datasource.url=${DATABASE_URL:jdbc:sqlserver://localhost:1433;databaseName=expense_manager;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=OLD_DATABASE_PASSWORD_1

spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

security.jwt.secret=${JWT_SECRET:}
security.jwt.access-token-lifetime=${JWT_ACCESS_TOKEN_LIFETIME:PT2H}
